<mat-card class="login-container">
  <h2 mat-card-title>Login</h2>
  <form (ngSubmit)="login()" #loginForm="ngForm">
    <mat-form-field appearance="fill" style="width:100%;">
      <mat-label>Username</mat-label>
      <input matInput id="username" name="username" type="text" ngModel />
    </mat-form-field>
    <mat-form-field appearance="fill" style="width:100%;">
      <mat-label>Password</mat-label>
      <input matInput id="password" name="password" type="password" ngModel />
    </mat-form-field>
    <button mat-raised-button color="primary" type="submit" style="width:100%;margin-top:16px;">Login</button>
  </form>
</mat-card>
