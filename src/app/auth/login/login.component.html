<form (ngSubmit)="login()" #loginForm="ngForm">
  <mat-form-field appearance="fill" style="width:100%;">
    <mat-label>Username</mat-label>
    <input matInput name="username" [(ngModel)]="datalogin.username" />
  </mat-form-field>

  <mat-form-field appearance="fill" style="width:100%;">
    <mat-label>Password</mat-label>
    <input matInput type="password" name="password" [(ngModel)]="datalogin.password" />
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit" style="width:100%;margin-top:16px;">
    Login
  </button>
</form>
