<div class="main-content">
  <h3>User Grid Popup Add</h3>
  <p class="subtitle">เพิ่มข้อมูลได้แบบ Pop up แล้วเห็นตารางอัปเดตทันที</p>
  <div class="card form-card">
    <div class="card-body">
      <button mat-flat-button color="primary" (click)="openAddDialog()">
        Add New User
      </button>
    </div>
  </div>
  <div class="grid">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">
      <ng-container matColumnDef="No">
        <th mat-header-cell *matHeaderCellDef class="text-center"> No. </th>
        <td mat-cell *matCellDef="let item; let i = index" class="text-center">
          {{ (pageIndex * pageSize) + i + 1 }}
        </td>
      </ng-container>
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="text-center"> ID </th>
        <td mat-cell *matCellDef="let item"> {{ item.id }} </td>
      </ng-container>
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Code </th>
        <td mat-cell *matCellDef="let item"> {{ item.code }} </td>
      </ng-container>
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Title </th>
        <td mat-cell *matCellDef="let item"> {{ item.title }} </td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Description </th>
        <td mat-cell *matCellDef="let item"> {{ item.description }} </td>
      </ng-container>
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Price </th>
        <td mat-cell *matCellDef="let item" class="text-right"> {{ item.price | currency:'THB' }} </td>
      </ng-container>
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Action </th>
        <td mat-cell *matCellDef="let item" class="text-center">
          <button mat-stroked-button color="warn" (click)="removeItem(item.id)">Delete</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageIndex]="pageIndex" (page)="onPageChange($event)">
    </mat-paginator>
  </div>

</div>
