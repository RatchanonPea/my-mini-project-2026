<section class="main-page">
  <div class="page-header">
    <div>
      <h3>Grid Inline Add</h3>
      <p class="subtitle">เพิ่มข้อมูลได้แบบ inline แล้วเห็นตารางอัปเดตทันที</p>
    </div>
  </div>

  <div class="card form-card">

    <!-- 🔹 FORM -->
    <div class="card-body inline-add-row" fxLayout="row" fxLayoutGap="16px" fxLayoutAlign="start center" fxLayoutWrap>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Title</mat-label>
        <input matInput [(ngModel)]="newItem.title" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Description</mat-label>
        <input matInput [(ngModel)]="newItem.description" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Price</mat-label>
        <input matInput type="number" [(ngModel)]="newItem.price" />
      </mat-form-field>

    </div>

    <!-- 🔻 ACTION -->
    <div class="form-action p-3"  fxLayout="row" fxLayoutAlign="end center">
      <button mat-flat-button color="primary"  style="margin-left: auto;" (click)="addItem()" [disabled]="!newItem.title || !newItem.description">
        Add Item
      </button>
    </div>

  </div>


  <div class="table-wrapper pt-3">
    <!-- <table mat-table [dataSource]="items" class="mat-elevation-z2"> -->
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="text-center"> ID </th>
        <td mat-cell *matCellDef="let item"> {{ item.id }} </td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Title </th>
        <td mat-cell *matCellDef="let item"> {{ item.title }} </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Description </th>
        <td mat-cell *matCellDef="let item"> {{ item.description }} </td>
      </ng-container>
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Price </th>
        <td mat-cell *matCellDef="let item"> {{ item.price | currency:'THB ' }} </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Action </th>
        <td mat-cell *matCellDef="let item" class="text-center">
          <button mat-stroked-button color="warn" (click)="removeItem(item.id)">Delete</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <!-- ✅ paginator ต้องอยู่นอก table -->
    <mat-paginator [length]="items.length" [pageSize]="5" [pageSizeOptions]="[5, 10, 20]">
    </mat-paginator>
  </div>
  <!-- <div class="table-wrapper">
    <table mat-table [dataSource]="items" class="mat-elevation-z2">
      table เดิม
    </table>
  </div> -->

  <!-- 🔻 TOTAL SECTION -->
  <div class="total-box">
    <div class="total-label">Total (รายได้รวม)</div>
    <div class="total-value">
      {{ getTotalPrice() | currency:'THB ':'symbol':'1.2-2' }}
    </div>
  </div>
</section>
